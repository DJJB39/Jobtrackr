<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=320" />
  <title>JobTrackr</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">JT</div>
      <h1>JobTrackr</h1>
    </div>

    <!-- Login Form -->
    <div id="login-view">
      <p class="subtitle">Sign in to save jobs from any page</p>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required autocomplete="email" />
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
        <button type="submit" id="login-btn">Sign In</button>
      </form>
      <p id="error-msg" class="error" style="display:none"></p>
    </div>

    <!-- Logged-in State -->
    <div id="authed-view" style="display:none">
      <div class="status-badge">
        <span class="dot"></span>
        Ready to save jobs
      </div>
      <p class="user-email" id="user-email"></p>

      <!-- Screenshot Capture -->
      <div class="screenshot-section">
        <button id="screenshot-btn" class="screenshot-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
            <circle cx="12" cy="13" r="3"/>
          </svg>
          Capture This Page
        </button>
        <p class="screenshot-hint">Takes a screenshot and extracts job details with AI</p>
      </div>

      <div id="extract-result" class="extract-result" style="display:none">
        <div class="extract-header">
          <span class="extract-badge" id="extract-badge">Extracted</span>
          <button id="extract-close" class="extract-close">&times;</button>
        </div>
        <div id="extract-fields"></div>
        <button id="save-extracted-btn" class="save-extracted-btn">Save to Board</button>
      </div>

      <div id="extract-loading" class="extract-loading" style="display:none">
        <div class="spinner"></div>
        <span>Extracting job details…</span>
      </div>

      <div id="extract-error" class="extract-error" style="display:none"></div>

      <div class="sites">
        <p class="sites-label">Also auto-detects jobs on:</p>
        <div class="site-list">
          <span class="site-tag">LinkedIn</span>
          <span class="site-tag">Indeed</span>
          <span class="site-tag">Reed</span>
          <span class="site-tag">Greenhouse</span>
        </div>
      </div>
      <button id="logout-btn" class="logout">Log Out</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
